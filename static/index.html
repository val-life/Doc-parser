<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>docparse</title>

  <!-- Fonts: Playfair Display (editorial serif) + DM Mono (humanist mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

  <!-- CSS — modular, loaded in dependency order -->
  <link rel="stylesheet" href="/static/css/variables.css" />
  <link rel="stylesheet" href="/static/css/reset.css" />
  <link rel="stylesheet" href="/static/css/animations.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/cards.css" />
  <link rel="stylesheet" href="/static/css/table.css" />
  <link rel="stylesheet" href="/static/css/upload.css" />
  <link rel="stylesheet" href="/static/css/document.css" />
  <link rel="stylesheet" href="/static/css/modal.css" />
  <link rel="stylesheet" href="/static/css/toast.css" />

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js" defer></script>
</head>

<body>
  <div id="app">

    <!-- ── Sidebar (book spine) ───────────────────────────────────── -->
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">docparse</span>
      </div>

      <nav id="sidebar-nav">
        <button class="nav-item" data-page="kb-list" aria-current="false">
          <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect x="1" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <rect x="10" y="1" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <rect x="1" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <rect x="10" y="10" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span>Knowledge Bases</span>
        </button>
        <button class="nav-item" data-page="models" aria-current="false">
          <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M9 2L16 6v6l-7 4-7-4V6l7-4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M9 6l4 2.3v3.4L9 14l-4-2.3V8.3L9 6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <circle cx="9" cy="9.5" r="1.2" fill="currentColor"/>
          </svg>
          <span>Models</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span class="version-tag">v2.0</span>
      </div>
    </aside>

    <!-- ── Main ──────────────────────────────────────────────────── -->
    <main id="main">
      <header id="topbar">
        <nav id="breadcrumb" aria-label="breadcrumb"></nav>
        <div id="topbar-actions"></div>
      </header>
      <div id="content" role="main"></div>
    </main>

  </div>

  <!-- ── Modal ─────────────────────────────────────────────────── -->
  <div id="modal-overlay" hidden aria-modal="true" role="dialog">
    <div id="modal" class="modal-box">
      <h2 id="modal-title" class="modal-title"></h2>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel"  class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── Toast notifications ───────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
